name: Verify PR

on:
  pull_request:
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'config/**'
      - 'tests/**'
      - 'scripts/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.cjs'
      - 'tailwind.config.cjs'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vercel.json'
      - '.github/workflows/**'

permissions:
  checks: write
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v6
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Type check
        run: npm run typecheck

      - name: Check unused declarations
        run: npm run check:unused

      - name: Verify generated configuration is committed
        run: git diff --exit-code

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Architecture regression tests
        run: npm run test:architecture

      - name: Check Edge Functions
        run: npm run check:edge

      - name: Check Cloudflare Worker
        run: npm run check:worker

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Full local backend integration
        run: npm run verify:integration
